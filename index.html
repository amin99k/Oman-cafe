<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royalty Cafe</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
background:url("https://images.unsplash.com/photo-1509042239860-f550ce710b93") center/cover no-repeat fixed;
}

body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,0.75);
backdrop-filter:blur(6px);
z-index:-1;
}

header{
text-align:center;
padding:30px;
}

header h1{
font-size:38px;
margin:0;
color:#e8d3a7;
}

.lang button{
margin:5px;
padding:8px 14px;
border-radius:20px;
border:1px solid #e8d3a7;
background:transparent;
color:#e8d3a7;
}

.lang button.active{
background:#e8d3a7;
color:black;
}

.tabs{
display:flex;
overflow:auto;
background:#000000aa;
}

.tabs button{
flex:1;
padding:14px;
border:0;
background:#222;
color:white;
}

.tabs button.active{
background:#e8d3a7;
color:black;
}

.section{
display:none;
padding:20px 10px 200px;
}

.section.active{
display:block;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
}

.card{
background:#111;
border-radius:15px;
overflow:hidden;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.cardBody{
padding:10px;
text-align:center;
}

.price{
color:#e8d3a7;
}

.add{
width:100%;
padding:8px;
background:#e8d3a7;
border:0;
color:black;
}

.cart{
position:fixed;
bottom:0;
width:100%;
background:black;
padding:10px;
}

select,button{
width:100%;
padding:10px;
margin-top:5px;
border-radius:10px;
border:0;
}

.waiter{
position:fixed;
right:15px;
bottom:200px;
background:#e8d3a7;
color:black;
border-radius:50%;
width:55px;
height:55px;
font-size:20px;
border:0;
}

</style>
</head>

<body>

<header>
<h1 id="brand">Royalty Cafe</h1>
<div class="lang">
<button class="active" onclick="setLang('en',this)">EN</button>
<button onclick="setLang('ar',this)">AR</button>
</div>
</header>

<div class="tabs">
<button class="active" onclick="show('drinks',this)" id="drinksTab">Drinks</button>
<button onclick="show('food',this)" id="foodTab">Food</button>
</div>

<div id="drinks" class="section active">
<div class="grid" id="drinksGrid"></div>
</div>

<div id="food" class="section">
<div class="grid" id="foodGrid"></div>
</div>

<button class="waiter" onclick="callWaiter()">🔔</button>

<div class="cart">
<select id="table"></select>
<p id="order"></p>

<button onclick="pay('paypal')" id="paypalBtn">PayPal</button>
<button onclick="pay('cash')" id="cashBtn">Cash</button>

<button onclick="submitOrder()" id="submitBtn">Submit</button>
</div>

<script>
let lang="en";
let cart=[];

const drinks=[
["Latte","لاتيه","https://images.unsplash.com/photo-1570968915860-54d5c301fa9f"],
["Espresso","إسبريسو","https://images.unsplash.com/photo-1510591509098-f4fdc6d0ff04"],
["Iced Coffee","قهوة مثلجة","https://images.unsplash.com/photo-1517701604599-bb29b565090c"],
["Mojito","موهيتو","https://images.unsplash.com/photo-1621263764928-df1444c5e859"],
["Orange Juice","عصير برتقال","https://images.unsplash.com/photo-1600271886742-f049cd451bba"]
];

const food=[
["Pizza","بيتزا","https://images.unsplash.com/photo-1604382355076-af4b0eb60143"],
["Pasta","باستا","https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9"],
["Burger","برجر","https://images.unsplash.com/photo-1568901346375-23c9450c58cd"],
["Lasagna","لازانيا","https://images.unsplash.com/photo-1619895092538-128341789043"]
];

function render(){
document.getElementById("drinksGrid").innerHTML=drinks.map(i=>card(i)).join("");
document.getElementById("foodGrid").innerHTML=food.map(i=>card(i)).join("");
}

function card(i){
return `
<div class="card">
<img src="${i[2]}">
<div class="cardBody">
<h3>${lang==="ar"?i[1]:i[0]}</h3>
<p class="price">2 OMR</p>
<button class="add" onclick="add('${i[0]}')">${lang==="ar"?"إضافة":"Add"}</button>
</div>
</div>`;
}

function add(item){
cart.push(item);
document.getElementById("order").innerText=cart.join(",");
}

function pay(type){
if(type==="paypal"){
alert(lang==="ar"?"باي بال غير متاح":"PayPal unavailable");
}
}

function submitOrder(){
alert(lang==="ar"?"سيأتي النادل":"Waiter will come");
}

function callWaiter(){
let t=prompt(lang==="ar"?"رقم الطاولة؟":"Table number?");
if(t) alert(lang==="ar"?"تم استدعاء النادل":"Waiter called");
}

function show(id,btn){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
}

function setLang(l,btn){
lang=l;
document.querySelectorAll(".lang button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

if(l==="ar"){
document.body.dir="rtl";
document.getElementById("brand").innerText="رويالتي كافيه";
document.getElementById("drinksTab").innerText="المشروبات";
document.getElementById("foodTab").innerText="الطعام";
document.getElementById("submitBtn").innerText="إرسال الطلب";
document.getElementById("cashBtn").innerText="نقدي";
document.getElementById("paypalBtn").innerText="باي بال";
}else{
document.body.dir="ltr";
document.getElementById("brand").innerText="Royalty Cafe";
document.getElementById("drinksTab").innerText="Drinks";
document.getElementById("foodTab").innerText="Food";
document.getElementById("submitBtn").innerText="Submit";
document.getElementById("cashBtn").innerText="Cash";
document.getElementById("paypalBtn").innerText="PayPal";
}

render();
}

for(let i=1;i<=30;i++){
let o=document.createElement("option");
o.innerText="Table "+i;
document.getElementById("table").appendChild(o);
}
let t=document.createElement("option");
t.innerText="Takeaway";
document.getElementById("table").appendChild(t);

render();
</script>

</body>
</html>
