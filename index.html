<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royalty Cafe</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
background:
linear-gradient(rgba(0,0,0,.4),rgba(0,0,0,.6)),
url("https://images.unsplash.com/photo-1554118811-1e0d58224f24?auto=format&fit=crop&w=1600&q=80")
center/cover fixed;
}

.logo{
text-align:center;
font-size:48px;
font-weight:900;
margin:25px 0;
background:linear-gradient(90deg,#fff3d5,#d7b982,#fff3d5);
-webkit-background-clip:text;
color:transparent;
}

.tabs{display:flex}
.tabs button{
flex:1;
padding:12px;
background:#222;
border:0;
color:white;
}
.tabs button.active{
background:#f4e7cf;
color:black;
}

.section{display:none;padding:20px 10px 160px}
.section.active{display:block}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
}

.card{
background:rgba(20,16,13,.7);
border-radius:15px;
overflow:hidden;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.cardBody{text-align:center;padding:10px}
.price{color:#f4e7cf}

.qty{
display:flex;
justify-content:center;
gap:10px;
margin-top:5px;
}

.qty button{
width:28px;height:28px;border-radius:50%;
border:0;background:#f4e7cf;color:black;
}

.orderBar{
position:fixed;
bottom:10px;
left:10px;
right:10px;
background:black;
padding:10px;
border-radius:15px;
}
</style>
</head>

<body>

<div class="logo">Royalty Cafe</div>

<div class="tabs">
<button class="active" onclick="show('drinks',this)">Drinks</button>
<button onclick="show('food',this)">Food</button>
</div>

<div id="drinks" class="section active">
<div class="grid" id="drinksGrid"></div>
</div>

<div id="food" class="section">
<div class="grid" id="foodGrid"></div>
</div>

<div class="orderBar">
<p id="order"></p>
<button onclick="confirmOrder()">Confirm Order</button>
<div id="cartDetails"></div>
</div>

<script>

let cart={}

const items=[
{name:"Latte",img:"https://images.unsplash.com/photo-1570968915860-54d5c301fa9f"},
{name:"Espresso",img:"https://images.unsplash.com/photo-1510591509098-f4fdc6d0ff04"},
{name:"Iced Coffee",img:"https://images.unsplash.com/photo-1517701604599-bb29b565090c"},
{name:"Mojito",img:"https://images.unsplash.com/photo-1551538827-9c037cb4f32a"},
{name:"Orange Juice",img:"https://images.unsplash.com/photo-1600271886742-f049cd451bba"},

{name:"Pizza",img:"https://images.unsplash.com/photo-1604382355076-af4b0eb60143"},
{name:"Pasta",img:"https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9"},
{name:"Burger",img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd"},
{name:"Lasagna",img:"https://images.unsplash.com/photo-1619895092538-128341789043"}
]

function render(){
document.getElementById("drinksGrid").innerHTML=items.slice(0,5).map(card).join("")
document.getElementById("foodGrid").innerHTML=items.slice(5).map(card).join("")
}

function card(i){
let c=cart[i.name]||0
return `
<div class="card">
<img src="${i.img}">
<div class="cardBody">
<h3>${i.name}</h3>
<p class="price">2 OMR</p>

<div class="qty">
<button onclick="update('${i.name}',-1)">-</button>
<span>${c}</span>
<button onclick="update('${i.name}',1)">+</button>
</div>

</div>
</div>`
}

function update(name,val){
cart[name]=(cart[name]||0)+val
if(cart[name]<=0) delete cart[name]
render()
updateOrder()
}

function updateOrder(){
let list=Object.entries(cart)
document.getElementById("order").innerText=
list.length?list.map(i=>i[0]+" x"+i[1]).join(", "):"No items"
}

function confirmOrder(){
let list=Object.entries(cart)
document.getElementById("cartDetails").innerHTML=
list.map(i=>`
<div>
${i[0]} x${i[1]}
<button onclick="update('${i[0]}',-1)">-</button>
<button onclick="update('${i[0]}',1)">+</button>
</div>`).join("")
}

function show(id,btn){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")
}

render()

</script>

</body>
</html>
