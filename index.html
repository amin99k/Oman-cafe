
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oman Cafe</title>
  <style>
    body{margin:0;font-family:Arial;background:#f7efe5;color:#2f1b10}
    header{background:#2f1b10;color:white;text-align:center;padding:24px}
    .hero{background:#5b331f;color:white;text-align:center;padding:90px 20px}
    .hero h1{font-size:46px;margin:0}
    section{padding:45px 20px;max-width:900px;margin:auto}
    h2{text-align:center}
    .card{background:white;padding:20px;margin:10px 0;border-radius:12px}
    .price{color:#c88b45;font-weight:bold}
    footer{background:#2f1b10;color:white;text-align:center;padding:20px}
  </style>
</head>
<body>
<header><h1>Oman Cafe</h1></header>

<div class="hero">
<h1>Fresh Coffee in Muscat</h1>
<p>Best coffee experience in Oman</p>
</div>

<section>
<h2>Menu</h2>
<div class="card"><h3>Omani Coffee</h3><p class="price">1.2 OMR</p></div>
<div class="card"><h3>Spanish Latte</h3><p class="price">1.8 OMR</p></div>
</section>

<footer>Oman Cafe - 2026</footer>
</body>
</html>
