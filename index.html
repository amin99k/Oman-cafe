<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royalty Cafe</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
background:
linear-gradient(rgba(0,0,0,.4),rgba(0,0,0,.6)),
url("https://images.unsplash.com/photo-1554118811-1e0d58224f24?auto=format&fit=crop&w=1600&q=80")
center/cover fixed;
}

.logo{
text-align:center;
font-size:50px;
font-weight:900;
margin:25px 0;
font-family:Georgia;
background:linear-gradient(90deg,#fff3d5,#d7b982,#fff3d5);
-webkit-background-clip:text;
color:transparent;
letter-spacing:2px;
}

.tabs,.subtabs{
display:flex;
overflow:auto;
}

.tabs button,.subtabs button{
flex:1;
padding:10px;
border:0;
background:#222;
color:white;
}

.tabs button.active,.subtabs button.active{
background:#f4e7cf;
color:black;
}

.section,.sub{
display:none;
padding:15px 10px 160px;
}

.section.active,.sub.active{
display:block;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:10px;
}

.card{
background:rgba(20,16,13,.7);
border-radius:12px;
overflow:hidden;
}

.card img{
width:100%;
height:100px;
object-fit:cover;
}

.cardBody{
padding:8px;
text-align:center;
}

.price{color:#f4e7cf;font-size:13px}

.qty{
display:flex;
justify-content:center;
gap:8px;
margin-top:5px;
}

.qty button{
width:24px;height:24px;border-radius:50%;
border:0;background:#f4e7cf;color:black;
}

.orderBar{
position:fixed;
bottom:10px;
left:10px;
right:10px;
background:black;
padding:10px;
border-radius:12px;
}

.waiter{
position:fixed;
right:15px;
bottom:150px;
background:#f4e7cf;
color:black;
border-radius:50%;
width:50px;
height:50px;
border:0;
}
</style>
</head>

<body>

<div class="logo">Royalty Cafe</div>

<div class="tabs">
<button class="active" onclick="show('drinks',this)">Drinks</button>
<button onclick="show('food',this)">Food</button>
</div>

<!-- DRINKS -->
<div id="drinks" class="section active">

<div class="subtabs">
<button class="active" onclick="sub('coffee',this)">Coffee</button>
<button onclick="sub('fresh',this)">Fresh</button>
</div>

<div id="coffee" class="sub active"><div class="grid" id="coffeeGrid"></div></div>
<div id="fresh" class="sub"><div class="grid" id="freshGrid"></div></div>

</div>

<!-- FOOD -->
<div id="food" class="section">

<div class="subtabs">
<button class="active" onclick="sub('pizza',this)">Pizza</button>
<button onclick="sub('pasta',this)">Pasta</button>
<button onclick="sub('burger',this)">Burger</button>
<button onclick="sub('lasagna',this)">Lasagna</button>
</div>

<div id="pizza" class="sub active"><div class="grid" id="pizzaGrid"></div></div>
<div id="pasta" class="sub"><div class="grid" id="pastaGrid"></div></div>
<div id="burger" class="sub"><div class="grid" id="burgerGrid"></div></div>
<div id="lasagna" class="sub"><div class="grid" id="lasagnaGrid"></div></div>

</div>

<button class="waiter" onclick="callWaiter()">🔔</button>

<div class="orderBar">

<div>
<label><input type="radio" name="mode" value="dine" checked> Dine In</label>
<label><input type="radio" name="mode" value="take"> Takeaway</label>
</div>

<select id="table"></select>

<p id="order"></p>

<button onclick="confirmOrder()">Confirm</button>

<div id="cartDetails"></div>

</div>

<script>

let cart={}

const menu={
coffee:[
["Latte","https://images.unsplash.com/photo-1570968915860-54d5c301fa9f"],
["Espresso","https://images.unsplash.com/photo-1510591509098-f4fdc6d0ff04"],
["Cappuccino","https://images.unsplash.com/photo-1534778101976-62847782c213"]
],
fresh:[
["Juice","https://images.unsplash.com/photo-1600271886742-f049cd451bba"],
["Mojito","https://images.unsplash.com/photo-1551538827-9c037cb4f32a"]
],
pizza:[
["Pizza","https://images.unsplash.com/photo-1604382355076-af4b0eb60143"]
],
pasta:[
["Pasta","https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9"]
],
burger:[
["Burger","https://images.unsplash.com/photo-1568901346375-23c9450c58cd"]
],
lasagna:[
["Lasagna","https://images.unsplash.com/photo-1619895092538-128341789043"]
]
}

function card(name,img){
let c=cart[name]||0
return `
<div class="card">
<img src="${img}">
<div class="cardBody">
<h3>${name}</h3>
<p class="price">2 OMR</p>
<div class="qty">
<button onclick="update('${name}',-1)">-</button>
<span>${c}</span>
<button onclick="update('${name}',1)">+</button>
</div>
</div>
</div>`
}

function render(){
Object.keys(menu).forEach(k=>{
document.getElementById(k+"Grid").innerHTML=
menu[k].map(i=>card(i[0],i[1])).join("")
})
}

function update(name,val){
cart[name]=(cart[name]||0)+val
if(cart[name]<=0) delete cart[name]
render()
updateOrder()
}

function updateOrder(){
let list=Object.entries(cart)
document.getElementById("order").innerText=
list.length?list.map(i=>i[0]+" x"+i[1]).join(", "):"No items"
}

function confirmOrder(){
let list=Object.entries(cart)
document.getElementById("cartDetails").innerHTML=
list.map(i=>`
<div>
${i[0]} x${i[1]}
<button onclick="update('${i[0]}',-1)">-</button>
<button onclick="update('${i[0]}',1)">+</button>
</div>`).join("")
}

function callWaiter(){
let t=prompt("Table?");
if(t) alert("Waiter coming");
}

function show(id,btn){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")
}

function sub(id,btn){
document.querySelectorAll(".sub").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
document.querySelectorAll(".subtabs button").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")
}

for(let i=1;i<=30;i++){
let o=document.createElement("option")
o.innerText="Table "+i
table.appendChild(o)
}

render()

</script>

</body>
</html>
